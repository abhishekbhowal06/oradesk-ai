# Cloud Run deployment configuration — ENTERPRISE SCALE
# Deploy with: gcloud run deploy oradesk-api --source .
#
# SCALING PARAMETERS (certified for 200+ clinics):
#   Memory: 2Gi (WebSocket + audio buffers + Gemini sessions)
#   CPU: 2 (concurrent request handling)
#   Min instances: 3 (high availability, cold start elimination)
#   Max instances: 50 (200-clinic peak load)
#   Concurrency: 40 (WebSocket-heavy workload)
#   Timeout: 3600s (long-lived WebSocket streams)

steps:
  # Step 1: Type check (quality gate)
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'cd services/ai-calling && npm ci && npx tsc --noEmit'

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/oradesk-api',
        '-f',
        'services/ai-calling/Dockerfile',
        '.',
      ]

  # Step 3: Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/oradesk-api']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'oradesk-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/oradesk-api'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--min-instances'
      - '3'
      - '--max-instances'
      - '50'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600'
      - '--concurrency'
      - '40'
      - '--session-affinity'

images:
  - 'gcr.io/$PROJECT_ID/oradesk-api'
