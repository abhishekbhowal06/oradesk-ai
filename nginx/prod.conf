events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimization
    sendfile        on;
    keepalive_timeout  65;
    gzip on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-CONTENT-TYPE-OPTIONS "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Upstream Definitions
    upstream frontend_upstream {
        server frontend:80;
    }

    upstream backend_upstream {
        server backend:8080;
    }

    # HTTP -> HTTPS Redirect (Global)
    server {
        listen 80;
        server_name dentacor.com www.dentacor.com app.dentacor.com api.dentacor.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Frontend (app.dentacor.com) & Root (dentacor.com)
    server {
        listen 443 ssl;
        server_name dentacor.com www.dentacor.com app.dentacor.com;

        # SSL Certificates (managed by Certbot)
        # Placeholder paths - Certbot will mount these
        ssl_certificate /etc/letsencrypt/live/dentacor.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dentacor.com/privkey.pem;
        
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Backend (api.dentacor.com)
    server {
        listen 443 ssl;
        server_name api.dentacor.com;

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/dentacor.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dentacor.com/privkey.pem;
        
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Websocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
