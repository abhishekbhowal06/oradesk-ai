# ── Docker Compose for AI Calling System ──────────────
# Usage:
#   docker compose up --build          (first time)
#   docker compose up -d               (detached)
#   docker compose logs -f backend     (stream logs)
#
# NOTE: Supabase is hosted externally — pass creds via .env files.

services:
  # ── Frontend (Vite SPA → Nginx) ──────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '${FRONTEND_PORT:-8085}:80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/']
      interval: 30s
      timeout: 3s
      retries: 3

  # ── Backend (Node.js API + WebSocket) ────────────────
  backend:
    build:
      context: .
      dockerfile: services/ai-calling/Dockerfile
    ports:
      - '${BACKEND_PORT:-3000}:8080'
    env_file:
      - services/ai-calling/.env
    environment:
      - NODE_ENV=production
      - PORT=8080
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
