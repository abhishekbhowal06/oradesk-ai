name: CI — Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════
  # BACKEND QUALITY GATES
  # ═══════════════════════════════════════════════════════
  backend:
    name: Backend — Type Check, Lint, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-calling

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/ai-calling/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ═══════════════════════════════════════════════════════
  # FRONTEND QUALITY GATES
  # ═══════════════════════════════════════════════════════
  frontend:
    name: Frontend — Type Check, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build (verify no compile errors)
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  # ═══════════════════════════════════════════════════════
  # DOCKER BUILD VERIFICATION
  # ═══════════════════════════════════════════════════════
  docker:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f services/ai-calling/Dockerfile -t oradesk-api:ci .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t oradesk-frontend:ci .

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'oradesk-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'oradesk-frontend:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
