version: '3.8'

services:
  # ── Frontend (Vite SPA) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    networks:
      - dentacor-net

  # ── Backend (Node.js API) ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: services/ai-calling/Dockerfile
    restart: always
    env_file:
      - services/ai-calling/.env.production
    environment:
      - NODE_ENV=production
      - PORT=8080
    networks:
      - dentacor-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/detailed" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Nginx Gateway (SSL Termination) ──────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - dentacor-net
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  # ── Certbot (SSL Renewal) ────────────────────────────
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  dentacor-net:
    driver: bridge
